services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    env_file:
      - env/zookeeper.env
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    env_file:
      - env/kafka.env
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server=localhost:29092"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    env_file:
      - env/mongo.env
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    env_file:
      - env/mongo-express.env
    depends_on:
      - mongo
    restart: on-failure

  couchbase:
    image: couchbase:community-7.6.2
    ports:
      - "8091:8091"   # Web UI
      - "8092:8092"
      - "8093:8093"   # N1QL
      - "8094:8094"
      - "11210:11210" # KV
    volumes:
      - couchbase-data:/opt/couchbase/var
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/ui/index.html"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  couchbase-init:
    image: curlimages/curl:latest
    depends_on:
      couchbase:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Step 1: Setting up node services..."
        curl -sf -X POST http://couchbase:8091/node/controller/setupServices \
          -d "services=kv%2Cn1ql%2Cindex" || echo "Services may already be set"
        sleep 2

        echo "Step 2: Setting memory quotas..."
        curl -sf -X POST http://couchbase:8091/pools/default \
          -d "memoryQuota=256" \
          -d "indexMemoryQuota=256" || echo "Quotas may already be set"
        sleep 1

        echo "Step 3: Setting admin credentials..."
        curl -sf -X POST http://couchbase:8091/settings/web \
          -d "password=password" \
          -d "username=Administrator" \
          -d "port=SAME" || echo "Credentials may already be set"
        sleep 2

        echo "Step 4: Creating bucket 'polymarket'..."
        curl -sf -X POST http://couchbase:8091/pools/default/buckets \
          -u Administrator:password \
          -d "name=polymarket" \
          -d "ramQuota=128" \
          -d "bucketType=couchbase" \
          -d "flushEnabled=1" || echo "Bucket may already exist"
        sleep 5

        echo "Step 5: Creating named collections..."
        for COLL in polymarket stock_news stock_analytics; do
          curl -sf -X POST \
            "http://couchbase:8091/pools/default/buckets/polymarket/scopes/_default/collections" \
            -u Administrator:password \
            -d "name=$$COLL" || echo "Collection $$COLL may already exist"
          sleep 1
        done

        echo "Verifying..."
        curl -sf -u Administrator:password http://couchbase:8091/pools/default/buckets | grep -q polymarket \
          && echo "Couchbase init COMPLETE — bucket 'polymarket' with collections [polymarket, stock_news, stock_analytics] ready." \
          || echo "WARNING: bucket verification failed"
    restart: "no"

  polymarket-event-producer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
    env_file:
      - env/polymarket-producer.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for MongoDB to be ready..."
        for idx in {1..30}; do
          echo "Attempt $$idx to check MongoDB..."
          nc -zv mongo 27017 && break
          sleep 1
        done
        echo "MongoDB is ready!"
        python -m event_detectors.polymarket_producer

  stock-news-event-producer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
    env_file:
      - env/stock-news-producer.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for MongoDB to be ready..."
        for idx in {1..30}; do
          nc -zv mongo 27017 && break
          sleep 1
        done
        echo "MongoDB is ready!"
        python -m event_detectors.stock_news_producer
    restart: on-failure

  stock-analytics-event-producer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
    env_file:
      - env/stock-analytics-producer.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for MongoDB to be ready..."
        for idx in {1..30}; do
          nc -zv mongo 27017 && break
          sleep 1
        done
        echo "MongoDB is ready!"
        python -m event_detectors.stock_analytics_producer
    restart: on-failure

  polymarket-event-consumer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    env_file:
      - env/polymarket-consumer.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for Kafka to be ready..."
        for idx in {1..30}; do
          echo "Attempt $$idx to check Kafka..."
          nc -zv kafka 29092 && break
          sleep 1
        done
        echo "Kafka is ready!"
        python -m event_processors.polymarket_consumer
    restart: on-failure

  stock-news-event-consumer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    env_file:
      - env/stock-news-consumer.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for Kafka to be ready..."
        for idx in {1..30}; do
          echo "Attempt $$idx to check Kafka..."
          nc -zv kafka 29092 && break
          sleep 1
        done
        echo "Kafka is ready!"
        python -m event_processors.stock_news_consumer
    restart: on-failure

  stock-analytics-event-consumer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    env_file:
      - env/stock-analytics-consumer.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for Kafka to be ready..."
        for idx in {1..30}; do
          echo "Attempt $$idx to check Kafka..."
          nc -zv kafka 29092 && break
          sleep 1
        done
        echo "Kafka is ready!"
        python -m event_processors.stock_analytics_consumer
    restart: on-failure

  web-bff-api:
    build: ./src/web-app/bff
    depends_on:
      mongo:
        condition: service_started
      couchbase:
        condition: service_healthy
    env_file:
      - env/web-bff.env
    ports:
      - "5001:5001"
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      - web-bff-api
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d

  grafana:
    image: grafana/grafana:11.1.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

  web-client-ui:
    build: ./src/web-app/web-client
    depends_on:
      - web-bff-api
    env_file:
      - env/web-client.env
    ports:
      - "5173:5173"
    restart: on-failure

volumes:
  mongo-data:
  couchbase-data:
  prometheus-data:
  grafana-data: