services:
  # ── Message broker ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    env_file:
      - env/zookeeper.env
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    env_file:
      - env/kafka.env
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server=localhost:29092"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── Databases ────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventedge
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/app_schema.sql:/docker-entrypoint-initdb.d/01_app_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventedge"]
      interval: 5s
      timeout: 5s
      retries: 20

  timescale:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_history
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./db/history_schema.sql:/docker-entrypoint-initdb.d/01_history_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_history"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eventedge.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres
      - timescale

  # ── Python producers (all 3 in one process) ─────────────────────────────────
  producer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - env/python.env
    environment:
      SERVICE_NAME: producer
    entrypoint:
      - /bin/bash
      - -c
      - |
        until nc -z kafka 29092; do sleep 1; done
        python -m event_detectors
    restart: on-failure

  # ── Python consumers (all 3 in one process) ──────────────────────────────────
  consumer:
    build: .
    ports:
      - "9101:9101"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - env/python.env
    environment:
      SERVICE_NAME: consumer
      PROMETHEUS_PORT: "9101"
    entrypoint:
      - /bin/bash
      - -c
      - |
        until nc -z kafka 29092; do sleep 1; done
        python -m event_processors
    restart: on-failure

  # ── New Python services ──────────────────────────────────────────────────────
  historical-ingestor:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
    env_file:
      - env/python.env
    environment:
      SERVICE_NAME: historical-ingestor
    entrypoint:
      - /bin/bash
      - -c
      - |
        python -m historical
    restart: on-failure

  ai-correlator:
    build: .
    ports:
      - "9105:9105"
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - env/python.env
    environment:
      SERVICE_NAME: ai-correlator
      PROMETHEUS_PORT: "9105"
    entrypoint:
      - /bin/bash
      - -c
      - |
        python -m ai_correlator.__main__
    restart: on-failure

  # ── Frontend (Next.js App Router — UI + BFF in one) ─────────────────────────
  nextjs:
    build: ./src/web
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - env/nextjs.env
    restart: on-failure

  # ── Observability ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d

  grafana:
    image: grafana/grafana:11.1.0
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres-data:
  timescale-data:
  pgadmin-data:
  prometheus-data:
  grafana-data:
