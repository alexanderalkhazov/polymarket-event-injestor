services:
  # ── Message broker ──────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    platform: linux/arm64
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s

  redpanda-console:
    image: redpandadata/console:latest
    platform: linux/arm64
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  # ── Databases ────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    platform: linux/arm64
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventedge
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/app_schema.sql:/docker-entrypoint-initdb.d/01_app_schema.sql:ro
    command: postgres -c shared_buffers=128MB -c max_connections=20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventedge"]
      interval: 5s
      timeout: 5s
      retries: 20

  timescale:
    image: timescale/timescaledb:latest-pg16
    platform: linux/arm64
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_history
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./db/history_schema.sql:/docker-entrypoint-initdb.d/01_history_schema.sql:ro
    command: postgres -c shared_buffers=256MB -c max_connections=20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_history"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    platform: linux/amd64
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres
      - timescale

  # ── Python producers ─────────────────────────────────────────────────────────
  polymarket-producer:
    build:
      context: src/event_detectors/polymarket_producer
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  news-producer:
    build:
      context: src/event_detectors/news_producer
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  analytics-producer:
    build:
      context: src/event_detectors/analytics_producer
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Python consumers ─────────────────────────────────────────────────────────
  polymarket-consumer:
    build:
      context: src/event_processors/polymarket_consumer
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  news-consumer:
    build:
      context: src/event_processors/news_consumer
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  analytics-consumer:
    build:
      context: src/event_processors/analytics_consumer
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Feature store (hourly snapshots + nightly label fill) ───────────────────
  feature-builder:
    build:
      context: src/feature_store
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
    restart: unless-stopped

  # ── Historical ingestor (nightly OHLCV + FRED macro) ────────────────────────
  historical-ingestor:
    build:
      context: src/historical
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    depends_on:
      timescale:
        condition: service_healthy
    restart: on-failure

  # ── AI correlator ────────────────────────────────────────────────────────────
  ai-correlator:
    build:
      context: src/ai_correlator
      dockerfile: Dockerfile
    platform: linux/arm64
    env_file: env/python.env
    volumes:
      - ./models:/app/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Next.js App Router — UI + BFF in one) ─────────────────────────
  nextjs:
    build: {context: src/web, dockerfile: Dockerfile}
    platform: linux/arm64
    ports:
      - "3000:3000"
    env_file: env/nextjs.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redpanda-data:
  postgres-data:
  timescale-data:
  redis-data:
  pgadmin-data:
